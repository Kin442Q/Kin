version: '3.9'

# ============================================================================
# Full stack: Postgres + Redis + NestJS API + Vite frontend.
# Запуск:
#   docker compose up --build
# После старта:
#   - API:      http://localhost:4000/api/v1
#   - Swagger:  http://localhost:4000/api/docs
#   - Frontend: http://localhost:5173
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: kg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kg_user
      POSTGRES_PASSWORD: kg_pass
      POSTGRES_DB: kg_db
    ports:
      - '5432:5432'
    volumes:
      - kg_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kg_user -d kg_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kg-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1']
    ports:
      - '6379:6379'
    volumes:
      - kg_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kg-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://kg_user:kg_pass@db:5432/kg_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    ports:
      - '5173:5173'

volumes:
  kg_db_data:
  kg_redis_data:
